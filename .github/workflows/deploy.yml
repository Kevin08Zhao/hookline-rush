name: Deploy game to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build game
        run: npm run build

      - name: Check out Pages branch
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: published

      - name: Publish game
        run: |
          git -C published rm -r --ignore-unmatch .
          cp -R dist/. published/
          touch published/.nojekyll
          git -C published config user.name "github-actions[bot]"
          git -C published config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C published add --all
          if git -C published diff --cached --quiet; then
            echo "No deployment changes."
          else
            git -C published commit -m "Deploy ${GITHUB_SHA}"
            git -C published push origin HEAD:gh-pages
          fi
